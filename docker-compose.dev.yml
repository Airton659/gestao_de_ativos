version: '3.8'

services:
  backend:
    build:
      context: ./backend-csharp/GATI.API
      dockerfile: Dockerfile.dev
    container_name: gati_backend_dev
    working_dir: /app
    volumes:
      - ./backend-csharp/GATI.API:/app
      - static_data:/app/static
    ports:
      - "8080:8080"
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    env_file:
      - ./.env

  frontend:
    image: node:20-slim
    container_name: gati_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  static_data:
